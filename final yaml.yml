name: Deploy Pipeline

on:
  push:
    branches:
      - main


jobs:
  # ================= DEV STAGE =================
  deploy-dev:
    runs-on: ubuntu-latest
    steps:
      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # SonarQube Scan (SonarCloud)
      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=SanjayMahapatra_argocd-zero-2-hero
            -Dsonar.organization=sanjaymahapatra
            -Dsonar.host.url=https://sonarcloud.io

      # Build Docker Image
      - name: Build Docker Image
        # run: docker build -t sanjaym1978/mychennel:${{ github.sha }} .
        run: docker build -f .github/Dockerfile -t sanjaym1978/mychennel:${{ github.sha }} .

      - name: Install Trivy
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      # Trivy Scan
      - name: TRIVY SCAN
        run: |
          docker images | head -n 50
          docker image inspect sanjaym1978/mychennel:${{ github.sha }}
          trivy image --severity HIGH,CRITICAL --exit-code 0 sanjaym1978/mychennel:${{ github.sha }}

      # Docker Login
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Push Image
      - name: Push Docker Image
        run: docker push sanjaym1978/mychennel:${{ github.sha }}

  # ================= QA STAGE =================
  deploy-qa:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - name: Deploy to QA
        run: echo "Deploying to QA"

  # ================= PROD STAGE =================
  deploy-prod:
    needs: deploy-qa
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Deploy to PROD
        run: echo "Deploying to PROD"
